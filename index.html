<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhunz's Sweet - Checklist Hub</title>
    <!-- Import Fonts & Tailwind -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Nunito', 'sans-serif'] },
                }
            }
        }
    </script>
    <!-- React & Babel Standalone -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #FFF9FB; margin: 0; padding: 0; color: #5D4037; }
        .soft-shadow { box-shadow: 0 20px 60px rgba(93, 64, 55, 0.08); }
        .animate-swing { animation: swing 2s infinite ease-in-out; }
        @keyframes swing { 0%, 100% { transform: rotate(-10deg); } 50% { transform: rotate(10deg); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #FFF5F7; }
        ::-webkit-scrollbar-thumb { background: #FFB7C5; border-radius: 10px; }
        .main-app-container { font-family: 'Nunito', sans-serif; }
        
        /* Cố định màu chữ đậm để không bị mất chữ */
        .soft-pastel-input { 
            width: 100%; background: #FFF9FA; border: 2.5px solid #F3F1F0; border-radius: 1.5rem; 
            padding: 1rem 1.4rem; font-size: 0.95rem; font-weight: 800; color: #5D4037 !important; 
            outline: none; transition: all 0.3s; 
        }
        .soft-pastel-input:focus { border-color: #FFB7C5; background: white; box-shadow: 0 10px 30px rgba(255,183,197,0.1); }
        
        .soft-pastel-select { 
            width: 100%; background: #FFF9FA; border: 2.5px solid #F3F1F0; border-radius: 1.5rem; 
            padding: 0.8rem 1.2rem; font-size: 0.95rem; font-weight: 800; color: #5D4037 !important; 
            outline: none; cursor: pointer; appearance: none; transition: all 0.3s;
        }
        .soft-pastel-select:focus { border-color: #FFB7C5; background: white; }
        
        /* Đảm bảo dropdown options có màu đen/nâu rõ ràng trên mobile/desktop */
        select option {
            color: #5D4037;
            background: white;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Cấu trúc Icon SVG Nội Khối ---
        const Icon = ({ name, size = 20, className = "", fill = "none", strokeWidth = 2.5 }) => {
            const icons = {
                Plus: <path d="M5 12h14M12 5v14" />,
                Trash2: <><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /><line x1="10" x2="10" y1="11" y2="17" /><line x1="14" x2="14" y1="11" y2="17" /></>,
                CheckCircle2: <><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z" /><path d="m9 12 2 2 4-4" /></>,
                Circle: <circle cx="12" cy="12" r="10" />,
                Settings: <><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" /><circle cx="12" cy="12" r="3" /></>,
                Bell: <><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" /><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" /></>,
                RefreshCcw: <><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><path d="M3 3v5h5" /><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" /><path d="M16 16h5v5" /></>,
                Heart: <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />,
                Sparkles: <path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z" />,
                XCircle: <><circle cx="12" cy="12" r="10" /><path d="m15 9-6 6M9 9l6 6" /></>,
                Timer: <><line x1="10" x2="14" y1="2" y2="2" /><line x1="12" x2="15" y1="14" y2="11" /><circle cx="12" cy="14" r="8" /></>,
                Layout: <><rect width="18" height="18" x="3" y="3" rx="2" /><path d="M3 9h18M9 21V9" /></>,
                Box: <><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z" /><path d="m3.3 7 8.7 5 8.7-5M12 22V12" /></>,
                UserCircle: <><circle cx="12" cy="12" r="10" /><circle cx="12" cy="10" r="3" /><path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662" /></>,
                ExternalLink: <><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" /><polyline points="15 3 21 3 21 9" /><line x1="10" x2="21" y1="14" y2="3" /></>,
                ChevronDown: <path d="m6 9 6 6 6-6" />,
                ChevronUp: <path d="m18 15-6-6-6 6" />,
                Link: <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />,
                Target: <><circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="6" /><circle cx="12" cy="12" r="2" /></>,
                Zap: <path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z" />
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        const webhookUrl = 'https://script.google.com/macros/s/AKfycbx3mib4nGZaXLJsy0BJnXocMdng-nzMMOPeJwsyJvh5p8mTbBpLBaaSC_AgKC5Z-TGS/exec';
        const scriptEditorUrl = 'https://script.google.com/u/0/home/projects/1RwBNHPSmKAJQjLhGBJL-n0GHQ6yK0nFLroEc858noQG5vr8LcOzvn3aj/edit';

        const App = () => {
            const [tasks, setTasks] = useState([]);
            const [showForm, setShowForm] = useState(false);
            const [showReminders, setShowReminders] = useState(false);
            const [expandedTask, setExpandedTask] = useState(null);
            const [syncStatus, setSyncStatus] = useState({ type: null, message: '' });
            const [deptFilter, setDeptFilter] = useState('All');
            const [statusFilter, setStatusFilter] = useState('All');

            const getNow = () => {
                const now = new Date();
                return {
                    date: now.toISOString().split('T')[0],
                    time: now.toTimeString().split(' ')[0].substring(0, 5)
                };
            };

            const initialForm = {
                taskName: '', classification: 'Cá nhân', project: 'TITAN F2 - Nhân sự',
                workGroup: 'Hoạt động cốt lõi & Hỗ trợ', taskType: 'Phát sinh', nextOccurrence: '',
                recordDate: getNow().date, deadline: '', startDate: getNow().date, startTime: getNow().time,
                endDate: '', endTime: '', priority: '2 - Plan (Kế hoạch)', pic: '', outcomeStatus: 'Chưa làm', relevantLink: '', notes: ''
            };
            const [formData, setFormData] = useState(initialForm);

            const dailyQuotes = useMemo(() => [
                { title: "Nhunz ơi, ngày mới thật rực rỡ nhé! 🌸", sub: "Mọi đầu việc đều sẽ hoàn thành thật xinh đẹp cùng Nhunz! ✨" },
                { title: "Chúc Nhunz một ngày làm việc suôn sẻ! ✨", sub: "Năng lượng tích cực sẽ giúp Nhunz giải quyết mọi checklist! 🎀" },
                { title: "Nhunz hãy tự tin và tỏa sáng nhé! 🎀", sub: "Mỗi bước đi của Nhunz đều mang lại giá trị tuyệt vời! 💖" },
                { title: "Một nụ cười của Nhunz làm ngày hôm nay đẹp hơn! 💖", sub: "Hãy cùng Nhunz tạo nên một ngày làm việc thật hiệu quả! 🌟" },
                { title: "Nhunz cố gắng lên, thành công đang chờ! 🌟", sub: "Mọi nỗ lực của Nhunz hôm nay đều sẽ được ghi nhận! 🌷" },
                { title: "Chúc Nhunz một ngày làm việc nhẹ nhàng! 🌷", sub: "Xử lý checklist thật êm ái như những đóa hoa Nhunz nhé! 👑" },
                { title: "Nhunz là giỏi nhất, hãy tỏa sáng nhé! 👑", sub: "Sẵn sàng cùng Nhunz chinh phục mọi mục tiêu khó khăn nhất! 🔥" }
            ], []);

            const currentQuote = useMemo(() => dailyQuotes[new Date().getDay()], [dailyQuotes]);

            useEffect(() => {
                const saved = localStorage.getItem('nhunz_tasks');
                if (saved) setTasks(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('nhunz_tasks', JSON.stringify(tasks));
            }, [tasks]);

            const syncToSheet = async (data, action = 'CREATE') => {
                try {
                    await fetch(webhookUrl, {
                        method: 'POST', mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ...data, action })
                    });
                    setSyncStatus({ type: 'success', message: action === 'CREATE' ? 'Đã lưu vào WEB! 🌸' : 'Đã cập nhật WEB! ✨' });
                    setTimeout(() => setSyncStatus({ type: null, message: '' }), 3000);
                } catch (err) { setSyncStatus({ type: 'error', message: 'Lỗi đồng bộ Sheet.' }); }
            };

            const calculateLeadtime = (startD, startT, endD, endT) => {
                if (!startD || !startT || !endD || !endT) return "N/A";
                try {
                    const start = new Date(`${startD}T${startT}`);
                    const end = new Date(`${endD}T${endT}`);
                    const diffMs = end - start;
                    if (diffMs < 0) return "Lỗi thời gian";
                    const hrs = Math.floor(diffMs / 3600000);
                    const mins = Math.round((diffMs % 3600000) / 60000);
                    return `${hrs}h ${mins}m`;
                } catch (e) { return "N/A"; }
            };

            const handleAddTask = async (e) => {
                e.preventDefault();
                let finalData = { ...formData, id: Date.now().toString() };
                if (finalData.outcomeStatus === 'Hoàn thành') {
                    const now = getNow();
                    finalData.endDate = now.date;
                    finalData.endTime = now.time;
                    finalData.completed = true;
                }
                finalData.leadtime = calculateLeadtime(finalData.startDate, finalData.startTime, finalData.endDate, finalData.endTime);
                setTasks([finalData, ...tasks]);
                await syncToSheet(finalData, 'CREATE');
                setFormData(initialForm);
                setShowForm(false);
            };

            const handleUpdateTask = (id, fields) => {
                const newTasks = tasks.map(t => {
                    if (t.id === id) {
                        let updated = { ...t, ...fields };
                        if (fields.outcomeStatus === 'Hoàn thành' && t.outcomeStatus !== 'Hoàn thành') {
                            const now = getNow();
                            updated.endDate = now.date;
                            updated.endTime = now.time;
                            updated.completed = true;
                        }
                        updated.leadtime = calculateLeadtime(updated.startDate, updated.startTime, updated.endDate, updated.endTime);
                        syncToSheet(updated, 'UPDATE');
                        return updated;
                    }
                    return t;
                });
                setTasks(newTasks);
            };

            const getPriorityStyle = (p) => {
                if (p?.includes('1 - Urgent')) return 'bg-[#5D4037] text-white font-black px-3 py-1 rounded-full';
                if (p?.includes('2 - Plan')) return 'bg-[#8D6E63] text-white font-bold px-3 py-1 rounded-full'; 
                if (p?.includes('3 - Delegate')) return 'bg-[#D7CCC8] text-[#5D4037] font-bold px-3 py-1 rounded-full'; 
                return 'bg-pink-100 text-pink-700 font-medium px-3 py-1 rounded-full';
            };

            const getOutcomeIcon = (status) => {
                switch (status) {
                    case 'Hoàn thành': return <Icon name="CheckCircle2" className="text-green-500" size={26}/>;
                    case 'Đang làm': return <Icon name="Timer" className="text-blue-500" size={26}/>;
                    case 'Không làm': return <Icon name="XCircle" className="text-rose-500" size={26}/>;
                    default: return <Icon name="Circle" className="text-stone-300" size={26}/>;
                }
            };

            const filteredTasks = tasks.filter(t => {
                const matchDept = deptFilter === 'All' || t.classification === deptFilter;
                const matchStatus = statusFilter === 'All' || (statusFilter === 'Done' ? t.outcomeStatus === 'Hoàn thành' : t.outcomeStatus === statusFilter);
                return matchDept && matchStatus;
            });

            const tasksToRemind = tasks.filter(t => (t.deadline === getNow().date || t.nextOccurrence === getNow().date) && t.outcomeStatus !== 'Hoàn thành');

            return (
                <div className="min-h-screen pb-20 main-app-container">
                    <nav className="bg-white/40 backdrop-blur-md border-b border-pink-50 sticky top-0 z-50 px-6 py-5 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-4">
                            <div className="bg-[#FFB7C5] p-3 rounded-[1.2rem] text-white shadow-lg shadow-pink-100">
                                <Icon name="Heart" fill="currentColor" />
                            </div>
                            <h1 className="text-xl font-black text-pink-600 uppercase tracking-tighter">Nhunz's Sweet</h1>
                        </div>
                        <div className="flex items-center gap-3">
                            <button onClick={() => window.open(scriptEditorUrl, '_blank')} className="p-2.5 rounded-[1rem] bg-pink-50/50 text-pink-500 hover:text-pink-600 transition-all flex items-center gap-2 px-4 shadow-sm font-bold">
                                <Icon name="Settings" size={18} />
                                <span className="text-[10px] font-black uppercase hidden sm:inline">Cài đặt</span>
                            </button>
                            <button onClick={() => setShowReminders(!showReminders)} className={`h-10 w-10 rounded-full flex items-center justify-center border shadow-sm relative transition-all ${showReminders ? 'bg-pink-100 border-pink-200' : 'bg-white border-pink-100'}`}>
                                <Icon name="Bell" size={18} className={tasksToRemind.length > 0 ? "text-rose-500 animate-swing" : "text-pink-200"} />
                                {tasksToRemind.length > 0 && <span className="absolute -top-1 -right-1 bg-rose-500 text-white text-[8px] font-black w-4 h-4 rounded-full flex items-center justify-center border-2 border-white">{tasksToRemind.length}</span>}
                            </button>
                        </div>
                    </nav>

                    {syncStatus.message && (
                        <div className={`fixed top-24 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 font-black text-sm animate-in slide-in-from-top-4 ${syncStatus.type === 'error' ? 'bg-rose-500 text-white' : 'bg-[#FFB7C5] text-white'}`}>
                            {syncStatus.type === 'error' ? <Icon name="XCircle" size={16}/> : <Icon name="CheckCircle2" size={16}/>}
                            {syncStatus.message}
                        </div>
                    )}

                    <main className="max-w-6xl mx-auto p-8">
                        <div className="mb-14 text-center">
                            <div className="inline-flex items-center gap-2 px-4 py-2 bg-white border border-pink-50 rounded-full shadow-sm mb-6 animate-pulse">
                                <Icon name="Sparkles" size={14} className="text-pink-400" />
                                <span className="text-[10px] font-black text-[#5D4037] tracking-wider uppercase">Message for Nhunz</span>
                            </div>
                            <h2 className="text-4xl font-black text-[#5D4037] mb-4 tracking-tight drop-shadow-sm">{currentQuote.title}</h2>
                            <p className="text-pink-500 text-sm font-bold italic opacity-90 uppercase tracking-widest">{currentQuote.sub}</p>
                        </div>

                        {showReminders && tasksToRemind.length > 0 && (
                            <div className="mb-12 p-6 bg-rose-50 border-2 border-dashed border-rose-200 rounded-[2rem] relative shadow-inner text-[#5D4037]">
                                <button onClick={() => setShowReminders(false)} className="absolute top-4 right-4 text-rose-300 hover:text-rose-500"><Icon name="XCircle" size={20}/></button>
                                <div className="flex items-center gap-3 mb-4">
                                    <div className="p-2 bg-rose-500 rounded-[1rem] text-white shadow-lg"><Icon name="Bell" size={20}/></div>
                                    <h4 className="text-sm font-black uppercase tracking-widest">NHẮC NHỞ CHO NHUNZ</h4>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                    {tasksToRemind.map(t => (
                                        <div key={t.id} className="bg-white/80 p-3 rounded-2xl border border-rose-100 text-[11px] font-bold text-stone-600 flex justify-between items-center shadow-sm">
                                            <span className="truncate pr-4">{t.taskName}</span>
                                            <span className="text-[9px] bg-rose-100 px-2 py-0.5 rounded text-rose-500">{t.deadline || t.nextOccurrence}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        <div className="grid grid-cols-2 gap-6 mb-12">
                            <div className="px-10 py-7 rounded-[2.5rem] flex flex-col items-center justify-center border-2 border-white shadow-lg bg-stone-50 text-[#5D4037]">
                                <Icon name="Heart" size={20} className="mb-2 text-pink-400" fill="currentColor"/>
                                <span className="text-[10px] font-black uppercase opacity-70">Tổng đầu việc</span>
                                <span className="text-4xl font-black">{tasks.length}</span>
                            </div>
                            <div className="px-10 py-7 rounded-[2.5rem] flex flex-col items-center justify-center border-2 border-white shadow-lg bg-rose-50 text-rose-600">
                                <Icon name="Zap" size={20} className="mb-2"/>
                                <span className="text-[10px] font-black uppercase opacity-70">Đang chờ Nhunz</span>
                                <span className="text-4xl font-black">{tasks.filter(t => t.outcomeStatus !== 'Hoàn thành').length}</span>
                            </div>
                        </div>

                        <div className="flex flex-col lg:flex-row gap-5 mb-10">
                            <button onClick={() => setShowForm(!showForm)} className={`flex-1 p-6 rounded-[2rem] flex items-center justify-center gap-4 font-black text-lg transition-all shadow-xl hover:-translate-y-1 ${showForm ? 'bg-[#5D4037] text-white' : 'bg-[#FFB7C5] text-white hover:bg-[#FFA4B5]'}`}>
                                {showForm ? <><Icon name="ChevronUp" size={22}/> THU GỌN FORM</> : <><Icon name="Plus" size={22}/> THÊM CHECKLIST CHO NHUNZ 🎀</>}
                            </button>
                            
                            <div className="flex items-center gap-2 bg-white p-3 rounded-[2rem] border border-pink-50 shadow-sm overflow-hidden">
                                <div className="flex flex-col px-6 border-r border-pink-50 min-w-[140px] items-center">
                                    <span className="text-[8px] font-black text-stone-400 uppercase mb-1 tracking-widest">PHÂN LOẠI</span>
                                    <select value={deptFilter} onChange={e => setDeptFilter(e.target.value)} className="bg-transparent border-none text-[10px] font-black outline-none text-[#5D4037] uppercase tracking-widest appearance-none cursor-pointer p-0 m-0 text-center"><option value="All">Tất cả</option><option value="Vùng">Vùng</option><option value="Regions">Regions</option><option value="Cá nhân">Cá nhân</option><option value="khác">Khác</option></select>
                                </div>
                                <div className="flex flex-col px-6 min-w-[140px] items-center">
                                    <span className="text-[8px] font-black text-stone-400 uppercase mb-1 tracking-widest">ĐẦU RA</span>
                                    <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)} className="bg-transparent border-none text-[10px] font-black outline-none text-[#5D4037] uppercase tracking-widest appearance-none cursor-pointer p-0 m-0 text-center"><option value="All">Tất cả</option><option value="Đang làm">Đang làm</option><option value="Done">Đã xong</option></select>
                                </div>
                            </div>
                        </div>

                        {showForm && (
                            <div className="bg-white border border-pink-50 rounded-[3rem] p-10 mb-12 shadow-[0_25px_60px_-15px_rgba(93,64,55,0.1)] animate-in zoom-in-95 duration-500">
                                <form onSubmit={handleAddTask} className="space-y-10">
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                                        <div className="space-y-6 text-[#5D4037]">
                                            <p className="text-[10px] font-black uppercase border-b border-pink-50 pb-2 flex items-center gap-2 tracking-widest"><Icon name="Layout" size={14}/> PHÂN LOẠI & PROJECT</p>
                                            <div className="flex flex-col gap-2"><label className="text-[10px] font-black uppercase ml-5 tracking-tight">Tên công việc 🌵</label><input required value={formData.taskName} onChange={e => setFormData({...formData, taskName: e.target.value})} className="soft-pastel-input" placeholder="Viết việc cần làm..." /></div>
                                            <div className="flex flex-col gap-2"><label className="text-[10px] font-black uppercase ml-5 tracking-tight">Phân loại 🐣</label><select value={formData.classification} onChange={e => setFormData({...formData, classification: e.target.value})} className="soft-pastel-select"><option value="Vùng">Vùng</option><option value="Regions">Regions</option><option value="Cá nhân">Cá nhân</option><option value="khác">Khác</option></select></div>
                                            <div className="flex flex-col gap-2"><label className="text-[10px] font-black uppercase ml-5 tracking-tight">Project ✨</label><select value={formData.project} onChange={e => setFormData({...formData, project: e.target.value})} className="soft-pastel-select"><option value="TITAN F2 - Nhân sự">TITAN F2 - Nhân sự</option><option value="TITAN F2 - Mô hình Giao lấy & Chính sách">TITAN F2 - Mô hình Giao lấy & Chính sách</option><option value="Champion">Champion</option><option value="Khác">Khác</option><option value="Không">Không</option></select></div>
                                        </div>
                                        <div className="space-y-6 text-[#5D4037]">
                                            <p className="text-[10px] font-black uppercase border-b border-pink-50 pb-2 flex items-center gap-2 tracking-widest"><Icon name="RefreshCcw" size={14}/> NHÓM & ĐỊNH KỲ</p>
                                            <div className="flex flex-col gap-2"><label className="text-[10px] font-black uppercase ml-5 tracking-tight">Nhóm công việc 📂</label><select value={formData.workGroup} onChange={e => setFormData({...formData, workGroup: e.target.value})} className="soft-pastel-select"><option value="Hoạt động cốt lõi & Hỗ trợ">Hoạt động cốt lõi & Hỗ trợ</option><option value="Quản trị & Giao tiếp">Quản trị & Giao tiếp</option><option value="Lập kế hoạch & Phân tích">Lập kế hoạch & Phân tích</option><option value="Đào tạo & Phát triển">Đào tạo & Phát triển</option></select></div>
                                            <div className="flex flex-col gap-2"><label className="text-[10px] font-black uppercase ml-5 tracking-tight">Loại hình🔄</label><select value={formData.taskType} onChange={e => setFormData({...formData, taskType: e.target.value})} className="soft-pastel-select"><option value="Phát sinh">Phát sinh</option><option value="Định kỳ">Định kỳ</option></select></div>
                                            {formData.taskType === 'Định kỳ' && <div className="flex flex-col gap-2"><label className="text-[10px] font-black text-rose-500 uppercase ml-5 tracking-tight">Ngày nhắc lại sau 🔔</label><input type="date" value={formData.nextOccurrence} onChange={e => setFormData({...formData, nextOccurrence: e.target.value})} className="soft-pastel-input bg-white border-rose-200" /></div>}
                                            <div className="flex flex-col gap-2"><label className="text-[10px] font-black uppercase ml-5 tracking-tight">PIC 👤</label><input value={formData.pic} onChange={e => setFormData({...formData, pic: e.target.value})} className="soft-pastel-input" placeholder="Tên PIC..." /></div>
                                        </div>
                                        <div className="space-y-6 text-[#5D4037]">
                                            <p className="text-[10px] font-black uppercase border-b border-pink-50 pb-2 flex items-center gap-2 tracking-widest"><Icon name="Target" size={14}/> ƯU TIÊN & TRẠNG THÁI</p>
                                            <div className="flex flex-col gap-2">
                                                <label className="text-[10px] font-black uppercase ml-5 tracking-tight">Ưu tiên ⭐️</label>
                                                {/* CẬP NHẬT: Ưu tiên theo hình image_1b04ba.png */}
                                                <select value={formData.priority} onChange={e => setFormData({...formData, priority: e.target.value})} className="soft-pastel-select font-bold">
                                                    <option value="1 - Urgent (Rất gấp)">🔥 1 - Urgent (Rất gấp)</option>
                                                    <option value="2 - Plan (Kế hoạch)">📅 2 - Plan (Kế hoạch)</option>
                                                    <option value="3 - Delegate (Ủy quyền)">🤝 3 - Delegate (Ủy quyền)</option>
                                                    <option value="4 - Ignore (Bỏ qua)">☁️ 4 - Ignore (Bỏ qua)</option>
                                                </select>
                                            </div>
                                            <div className="flex flex-col gap-2">
                                                <label className="text-[10px] font-black uppercase ml-5 tracking-tight">Đầu ra 🎯</label>
                                                <select value={formData.outcomeStatus} onChange={e => setFormData({...formData, outcomeStatus: e.target.value})} className="soft-pastel-select font-black">
                                                    <option value="Chưa làm">⚪ Chưa làm</option>
                                                    <option value="Đang làm">⏳ Đang làm</option>
                                                    <option value="Hoàn thành">✅ Hoàn thành</option>
                                                    <option value="Không làm">🚫 Không làm</option>
                                                </select>
                                            </div>
                                            <div className="bg-[#FFFBFC] p-4 rounded-2xl border border-pink-50"><div className="flex flex-col gap-2"><label className="text-[10px] font-black uppercase ml-1 tracking-tight">Deadline 🗓️</label><input type="date" value={formData.deadline} onChange={e => setFormData({...formData, deadline: e.target.value})} className="soft-pastel-input bg-white" /></div></div>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-10 pt-8 border-t border-stone-100">
                                        <div className="space-y-6 text-[#5D4037]">
                                            <div className="flex gap-4 items-end">
                                                <div className="flex flex-col gap-2 flex-1"><label className="text-[10px] font-black uppercase ml-5 tracking-tight">Bắt đầu 🕓</label><input type="date" value={formData.startDate} onChange={e => setFormData({...formData, startDate: e.target.value})} className="soft-pastel-input text-[11px]" /></div>
                                                <div className="flex flex-col gap-2 flex-1"><label className="text-[10px] font-black uppercase ml-5 tracking-tight">Giờ bắt đầu</label><div className="flex gap-2"><input type="time" value={formData.startTime} onChange={e => setFormData({...formData, startTime: e.target.value})} className="soft-pastel-input text-[11px] flex-1" /><button type="button" onClick={() => setFormData({...formData, ...getNow()})} className="bg-pink-50 p-2 rounded-xl text-pink-500 transition-colors hover:bg-pink-100"><Icon name="RefreshCcw" size={16}/></button></div></div>
                                            </div>
                                            <div className="flex flex-col gap-2"><label className="text-[10px] font-black uppercase ml-5 tracking-tight">Link tài liệu 🔗</label><input type="url" value={formData.relevantLink} onChange={e => setFormData({...formData, relevantLink: e.target.value})} className="soft-pastel-input" placeholder="Dán link tại đây..." /></div>
                                        </div>
                                        <div className="flex flex-col gap-2"><label className="text-[10px] font-black text-[#5D4037] uppercase ml-5 tracking-tight">Ghi chú chi tiết 📝</label><textarea rows="5" value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} className="soft-pastel-input resize-none" placeholder="Nhunz lưu ý gì thêm không?..." /></div>
                                    </div>
                                    <button type="submit" className="w-full bg-[#5D4037] text-white font-black py-6 rounded-[2.5rem] shadow-xl flex items-center justify-center gap-4 transition-all uppercase text-xl hover:bg-stone-800 tracking-widest active:scale-95">LƯU CHECKLIST & ĐỒNG BỘ 🎀</button>
                                </form>
                            </div>
                        )}

                        <div className="space-y-6">
                            {filteredTasks.length === 0 ? (
                                <div className="text-center py-32 bg-white rounded-[3rem] border-2 border-dashed border-pink-200 text-pink-700 font-black italic shadow-sm">
                                    Hôm nay trống trơn rồi Nhunz ơi ☁️
                                </div>
                            ) : (
                                filteredTasks.map(task => (
                                    <div key={task.id} className={`bg-white rounded-[2.5rem] transition-all border ${task.outcomeStatus === 'Hoàn thành' ? 'opacity-70 border-transparent bg-pink-50/10' : 'border-pink-50 soft-shadow hover:shadow-xl hover:-translate-y-1'}`}>
                                        {(task.deadline === getNow().date || task.nextOccurrence === getNow().date) && task.outcomeStatus !== 'Hoàn thành' && <div className="h-2.5 w-full bg-rose-400 rounded-t-full"></div>}
                                        <div className="p-8 flex flex-col md:flex-row items-start md:items-center gap-7 text-[#5D4037]">
                                            <div className="cursor-pointer transform scale-110 active:scale-90 transition-transform" onClick={() => handleUpdateTask(task.id, { outcomeStatus: task.outcomeStatus === 'Hoàn thành' ? 'Chưa làm' : 'Hoàn thành' })}>
                                                {getOutcomeIcon(task.outcomeStatus)}
                                            </div>
                                            <div className="flex-1 cursor-pointer w-full" onClick={() => setExpandedTask(expandedTask === task.id ? null : task.id)}>
                                                <div className="flex flex-wrap gap-2 mb-2">
                                                    <span className="text-[7px] font-black px-2.5 py-1 rounded-full bg-stone-100 text-stone-500 uppercase flex items-center justify-center min-w-[65px] text-center">{task.classification}</span>
                                                    <span className={getPriorityStyle(task.priority)} style={{fontSize: '7px', letterSpacing: '0.1em'}}>{task.priority.toUpperCase()}</span>
                                                    <span className="text-[7px] font-black px-2.5 py-1 rounded-full bg-white border border-pink-100 text-pink-500 uppercase flex items-center justify-center min-w-[65px] text-center">{task.taskType}</span>
                                                </div>
                                                <h3 className={`text-xl font-bold text-stone-800 leading-tight ${task.outcomeStatus === 'Hoàn thành' ? 'line-through text-stone-400' : ''}`}>{task.taskName}</h3>
                                                <div className="flex gap-4 mt-3 text-[10px] font-black text-stone-400 uppercase tracking-tight">
                                                    <span className="flex items-center gap-1.5"><Icon name="UserCircle" size={12}/> PIC: {task.pic || 'Nhunz'}</span>
                                                    <span className="flex items-center gap-1.5"><Icon name="Box" size={12}/> {task.workGroup}</span>
                                                </div>
                                            </div>
                                            <div className="flex gap-3">
                                                <button onClick={() => setExpandedTask(expandedTask === task.id ? null : task.id)} className="h-12 w-12 rounded-[1.2rem] bg-stone-50 text-stone-400 hover:bg-white flex items-center justify-center shadow-sm transition-all">{expandedTask === task.id ? <Icon name="ChevronUp" /> : <Icon name="ChevronDown" />}</button>
                                                <button onClick={() => setTasks(tasks.filter(t => t.id !== task.id))} className="h-12 w-12 rounded-[1.2rem] bg-rose-50 text-rose-400 hover:text-rose-600 flex items-center justify-center shadow-sm transition-all"><Icon name="Trash2" size={20}/></button>
                                            </div>
                                        </div>
                                        {expandedTask === task.id && (
                                            <div className="px-12 pb-12 pt-6 border-t border-stone-50 bg-[#FFFDFF] animate-in fade-in slide-in-from-top-4 duration-500 text-[#5D4037]">
                                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                                                    <div className="space-y-4">
                                                        <div className="flex flex-col border-l-4 pl-5 border-stone-100 py-1"><span className="text-[9px] font-black text-stone-400 uppercase tracking-widest">Ngày ghi checklist</span><span className="text-sm font-bold text-stone-800">{task.recordDate}</span></div>
                                                        <div className="flex flex-col border-l-4 pl-5 border-stone-100 py-1"><span className="text-[9px] font-black text-stone-400 uppercase tracking-widest">Deadline</span><span className="text-sm font-bold text-rose-600">{task.deadline || "Vô thời hạn"}</span></div>
                                                        <div className="flex flex-col border-l-4 pl-5 border-stone-100 py-1"><span className="text-[9px] font-black text-stone-400 uppercase tracking-widest">Leadtime xử lý</span><span className="text-sm font-bold text-pink-600">{task.leadtime}</span></div>
                                                    </div>
                                                    <div className="space-y-6 bg-stone-50/50 p-6 rounded-[2rem] border border-stone-100">
                                                        <div className="flex flex-col gap-2"><label className="text-[9px] font-black text-stone-500 uppercase ml-2 text-center tracking-widest">Cập nhật trạng thái 🎯</label>
                                                            <select value={task.outcomeStatus} onChange={(e) => handleUpdateTask(task.id, { outcomeStatus: e.target.value })} className="bg-white border-2 border-stone-100 rounded-2xl p-3 text-xs font-bold outline-none shadow-sm">
                                                                <option value="Chưa làm">⚪ Chưa làm</option>
                                                                <option value="Đang làm">⏳ Đang làm</option>
                                                                <option value="Hoàn thành">✅ Hoàn thành</option>
                                                                <option value="Không làm">🚫 Không làm</option>
                                                            </select>
                                                        </div>
                                                        <div className="flex flex-col gap-2"><label className="text-[9px] font-black text-stone-500 uppercase ml-2 text-center tracking-widest">Ghi chú 📝</label><textarea defaultValue={task.notes} onBlur={(e) => handleUpdateTask(task.id, { notes: e.target.value })} className="bg-white border-2 border-stone-100 rounded-2xl p-4 text-xs font-bold resize-none h-32 outline-none focus:border-pink-300 shadow-sm" placeholder="Sửa xong nhấn ra ngoài để lưu..."/></div>
                                                    </div>
                                                    <div className="bg-white p-7 rounded-[2rem] border-l-8 border-pink-200 soft-shadow flex flex-col justify-center">
                                                        <p className="text-[10px] font-black text-stone-400 uppercase mb-4 flex items-center gap-2 tracking-widest"><Icon name="Sparkles" size={14} className="text-pink-300"/> TÓM TẮT VẬN HÀNH</p>
                                                        <div className="space-y-3">
                                                            <div className="flex justify-between border-b border-stone-50 pb-2"><span className="text-[8px] font-black text-stone-400">DỰ ÁN:</span><span className="text-[9px] font-bold text-stone-700">{task.project}</span></div>
                                                            <div className="flex justify-between border-b border-stone-50 pb-2"><span className="text-[8px] font-black text-stone-400">BẮT ĐẦU:</span><span className="text-[9px] font-bold text-stone-700">{task.startDate} {task.startTime}</span></div>
                                                            <div className="flex justify-between border-b border-stone-50 pb-2"><span className="text-[8px] font-black text-stone-400">KẾT THÚC:</span><span className="text-[9px] font-bold text-stone-700">{task.endDate || 'Đang thực hiện'}</span></div>
                                                            {task.relevantLink && <a href={task.relevantLink} target="_blank" className="text-[9px] font-black text-blue-500 underline flex items-center gap-1 mt-2 flex items-center gap-1 transition-colors hover:text-blue-700">Mở link tài liệu <Icon name="ExternalLink" size={12}/></a>}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ))
                            )}
                        </div>
                    </main>
                    <footer className="mt-20 text-center text-stone-300 uppercase font-black text-[9px] tracking-[0.4em] pb-10">Created for Nhunz with Love • GitHub Edition v13.4</footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
